version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: abuvi-postgres
    environment:
      POSTGRES_DB: abuvi
      POSTGRES_USER: abuvi_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abuvi_user -d abuvi"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
